# ============================================================
# SAM CLI Configuration - Despliegue via GitHub Actions
# Cada alumno despliega su propio stack con su rama
# ============================================================
version = 0.1

# ============================================================
# DEV-LUIS - Instructor (rama: main)
# ============================================================
[default.global.parameters]
stack_name = "seguridad-sam-dev-luis"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = true
region = "us-east-1"
parameter_overrides = "Environment=\"dev-luis\" LambdaMemory=\"128\" LambdaTimeout=\"10\" CorsOrigin=\"*\" RetentionDays=\"7\""
tags = "Environment=\"dev-luis\" Team=\"security-class\" ManagedBy=\"SAM-GitHubActions\""

[default.package.parameters]
resolve_s3 = true

